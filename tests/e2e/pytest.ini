[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Playwright defaults
# -p no:homeassistant: pytest-homeassistant-custom-component autouse fixtures
# block all sockets (except 127.0.0.1) via pytest-socket. E2E tests connect
# to Docker-hosted HA/UniFi and don't use any HA in-process fixtures, so
# the plugin adds no value and its socket blocking breaks everything.
addopts = --browser chromium -p no:homeassistant

# Markers
markers =
    asyncio: mark test as async
