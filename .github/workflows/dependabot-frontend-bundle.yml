name: Dependabot frontend bundle

# Dependabot can bump a bundled frontend dependency (e.g. dompurify) but
# cannot run the build, so the committed bundle drifts and the CI
# frontend-build check fails. This workflow rebuilds the bundle on
# Dependabot frontend PRs and commits it back to the PR branch, so the
# branch (and main, once merged) always matches the locked dependencies.
#
# Security: this is a pull_request_target workflow with a write token, so
# it must never execute PR-controlled code with that token in scope:
#   - npm lifecycle/postinstall scripts are disabled (NPM_CONFIG_IGNORE_SCRIPTS)
#     so a compromised dependency Dependabot bumps to cannot run code at install;
#   - the build runs with NO credentials persisted (persist-credentials: false);
#   - the GITHUB_TOKEN is only introduced in the final commit/push step, which
#     runs trusted git commands only;
#   - actions are pinned to full commit SHAs.
on:
  pull_request_target:
    paths:
      - frontend/package.json
      - frontend/package-lock.json

# Scoped to the minimum needed to push the rebuilt bundle to the PR branch.
permissions:
  contents: write

concurrency:
  group: dependabot-frontend-bundle-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  rebuild-bundle:
    # Only ever runs for Dependabot, never for human-authored PRs.
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          # Do not leave a write-capable token in .git/config while building
          # PR-supplied dependencies. The push step authenticates explicitly.
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Rebuild card bundle
        # Disable npm lifecycle scripts so no dependency code executes during
        # install. esbuild bundling transforms source but does not run it, and
        # Dependabot only changes dependency versions (not build scripts), so
        # the build itself stays trusted. No token is present in this step.
        env:
          NPM_CONFIG_IGNORE_SCRIPTS: "true"
        run: make frontend-build
      - name: Commit rebuilt bundle if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          bundle_paths="frontend/dist/unifi-network-map.js custom_components/unifi_network_map/frontend/unifi-network-map.js"
          if git diff --quiet -- $bundle_paths; then
            echo "Bundle already in sync; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $bundle_paths
          git commit -m "Rebuild frontend bundle for dependency update"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" "HEAD:$HEAD_REF"
